<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Professional Todo App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Background Circles -->
    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <div class="container">

        <!-- Header -->

        <header>

            <h1>
                <i class="fa-solid fa-list-check"></i>
                My Todo List
            </h1>

            <p>
                Organize your daily tasks efficiently
            </p>

        </header>


        <!-- Statistics -->

        <section class="stats">

            <div class="stat-box">
                <h2 id="totalTasks">0</h2>
                <span>Total</span>
            </div>

            <div class="stat-box">
                <h2 id="completedTasks">0</h2>
                <span>Completed</span>
            </div>

            <div class="stat-box">
                <h2 id="pendingTasks">0</h2>
                <span>Pending</span>
            </div>

        </section>



        <!-- Add Task -->

        <section class="todo-form">

            <div class="input-group">

                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter task...">

            </div>

            <div class="row">

                <input
                    type="date"
                    id="taskDate">

                <select id="priority">

                    <option value="High">
                        High Priority
                    </option>

                    <option value="Medium">
                        Medium Priority
                    </option>

                    <option value="Low">
                        Low Priority
                    </option>

                </select>

            </div>

            <button id="addBtn">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </section>



        <!-- Search -->

        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Task...">

        </section>



        <!-- Filters -->

        <section class="filters">

            <button
                class="filter active"
                data-filter="all">

                All

            </button>

            <button
                class="filter"
                data-filter="pending">

                Pending

            </button>

            <button
                class="filter"
                data-filter="completed">

                Completed

            </button>

        </section>



        <!-- Todo List -->

        <section>

            <ul id="todoList">

            </ul>

        </section>



        <!-- Empty State -->

        <div
            class="empty-state"
            id="emptyState">

            <i class="fa-regular fa-face-smile"></i>

            <h2>No Tasks Yet</h2>

            <p>

                Add your first task and start being productive!

            </p>

        </div>



        <!-- Footer -->

        <footer>

            Made with ❤️ using HTML CSS JavaScript

        </footer>

    </div>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
